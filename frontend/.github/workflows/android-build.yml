name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Install Capacitor
      run: |
        cd frontend
        npm install @capacitor/core @capacitor/cli @capacitor/android
    
    - name: Build web app
      run: |
        cd frontend
        npm run build
    
    - name: Create Capacitor Config
      run: |
        cd frontend
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.noteapp.app",
          "appName": "Note App",
          "webDir": "dist",
          "server": {
            "url": "https://note-app-backend-kp7x.onrender.com",
            "cleartext": true
          },
          "android": {
            "allowMixedContent": true
          }
        }
        EOF
    
    - name: Add Android Platform
      run: |
        cd frontend
        npx cap add android
        npx cap sync
    
    - name: Build Debug APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: note-app-apk
        path: frontend/android/app/build/outputs/apk/debug/*.apk