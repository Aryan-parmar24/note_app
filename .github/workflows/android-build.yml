name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Build web app
      working-directory: ./frontend
      run: npm run build
    
    - name: Install Capacitor
      working-directory: ./frontend
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Note App" "com.yourname.noteapp" --web-dir=dist
        rm -rf android 2>/dev/null || true
        npx cap add android
        npx cap sync
    
    - name: Build APK
      working-directory: ./frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME_17_X64
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: note-app-apk
        path: frontend/android/app/build/outputs/apk/debug/*.apk
