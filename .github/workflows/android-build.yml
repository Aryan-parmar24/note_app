name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Install Capacitor
      run: |
        cd frontend
        npm install @capacitor/core @capacitor/cli @capacitor/android
    
    - name: Build web app
      run: |
        cd frontend
        npm run build
    
    - name: Create Capacitor Config
      run: |
        cd frontend
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.noteapp.app",
          "appName": "Note App",
          "webDir": "dist",
          "server": {
            "url": "https://note-app-orcin-beta.vercel.app",
            "cleartext": true
          },
          "android": {
            "allowMixedContent": true
          }
        }
        EOF
    
    - name: Setup Android Platform
      run: |
        cd frontend
        rm -rf android
        npx cap add android
        npx cap sync
    
    - name: Build Debug APK
      run: |
        cd frontend/android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Rename APK
      run: |
        cp frontend/android/app/build/outputs/apk/debug/app-debug.apk ./NoteApp.apk
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: note-app-apk
        path: ./NoteApp.apk
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Note App v1.0.${{ github.run_number }}
        body: |
          📱 Note App Android APK
          Download NoteApp.apk and install on your phone!
        files: ./NoteApp.apk
