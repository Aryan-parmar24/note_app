name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Setup Java 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Build web app
      working-directory: ./frontend
      run: npm run build
    
    - name: Install Capacitor 5 (Most Stable)
      working-directory: ./frontend
      run: |
        npm install @capacitor/core@5.7.0
        npm install @capacitor/cli@5.7.0
        npm install @capacitor/android@5.7.0
        npx cap init "Note App" "com.yourname.noteapp" --web-dir=dist
        npx cap add android
        npx cap sync
    
    - name: Build APK
      working-directory: ./frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: note-app-apk
        path: frontend/android/app/build/outputs/apk/debug/*.apk
