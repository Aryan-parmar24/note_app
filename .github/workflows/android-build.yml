name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Build web app
      working-directory: ./frontend
      run: npm run build
    
    - name: Install Capacitor
      working-directory: ./frontend
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "Note App" "com.yourname.noteapp" --web-dir=dist
        rm -rf android 2>/dev/null || true
        npx cap add android
        npx cap sync
    
    - name: Fix Gradle for Java 17
      working-directory: ./frontend/android
      run: |
        # Update gradle version to work with Java 17
        sed -i 's/classpath "com.android.tools.build:gradle:.*/classpath "com.android.tools.build:gradle:7.4.2"/' app/build.gradle
        
        # Set Java compatibility
        cat >> app/build.gradle << 'EOF'
android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
EOF
    
    - name: Build APK
      working-directory: ./frontend/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: note-app-apk
        path: frontend/android/app/build/outputs/apk/debug/*.apk
